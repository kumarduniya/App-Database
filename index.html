<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Study Notes Manager | लाइव ऐप</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #fff3e0 0%, #ffe6c7 100%); min-height: 100vh; padding: 1.5rem 1rem; }
        .app-container { max-width: 1100px; margin: 0 auto; display: none; }
        
        /* लोडिंग स्क्रीन */
        #loadingScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; color: white; }
        .loader-spinner { border: 5px solid #334155; border-top: 5px solid #f97316; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ========= HEADER (Centered & Premium) ========= */
        .hero-section { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); 
            padding: 1.2rem 2rem; margin-bottom: 1.5rem; 
            border-left: 6px solid #f39c12; border-radius: 8px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .title-box { flex: 1; }
        .title-box h1 { font-size: 1.8rem; background: linear-gradient(130deg, #fff3cf, #ffd966); -webkit-background-clip: text; background-clip: text; color: transparent; font-weight: 900; }
        .title-box p { color: #fdebb3; font-weight: 500; margin-top: 6px; font-size: 0.9rem;}
        .header-actions { display: flex; gap: 12px; }
        .admin-lock-icon { background: linear-gradient(145deg, #ff9f4a, #ff7e2e); padding: 10px 20px; color: white; font-weight: 800; cursor: pointer; border-radius: 8px; transition: 0.2s; box-shadow: 0 5px 12px rgba(0,0,0,0.2); white-space: nowrap;}
        .admin-lock-icon:hover { background: #e67e22; transform: translateY(-3px); }

        @media (max-width: 650px) {
            .hero-section { flex-direction: column; text-align: center; gap: 15px; padding: 1.5rem 1rem;}
            .header-actions { width: 100%; justify-content: center; }
        }

        /* ========= SEARCH BAR ========= */
        .search-bar-container {
            background: #1e293b; padding: 12px 20px; border-radius: 8px; margin-bottom: 2.5rem;
            display: flex; align-items: center; gap: 12px; border-left: 6px solid #10b981;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .search-bar-container i { color: #10b981; font-size: 1.2rem; }
        .search-bar-container input {
            background: transparent; border: none; color: white; width: 100%; 
            font-size: 1.05rem; outline: none; font-weight: 500;
        }
        .search-bar-container input::placeholder { color: #94a3b8; }

        /* ========= APP STYLE GRID ========= */
        .subjects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 1.8rem; margin-bottom: 3rem; justify-items: center; align-items: start; }
        @media (max-width: 450px) { .subjects-grid { grid-template-columns: repeat(3, 1fr); gap: 1.2rem; } }
        .subject-card { display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; transition: all 0.3s ease; width: 100%; }
        .subject-card:hover { transform: translateY(-5px); }
        .app-icon-box { width: 90px; height: 90px; border-radius: 24px; display: flex; justify-content: center; align-items: center; font-size: 2.8rem; color: white; box-shadow: 0 10px 20px -5px rgba(0,0,0,0.3); position: relative; }

        .app-icon-box[data-section="Hindi"] { background: linear-gradient(135deg, #1e3c72, #2a5298); }
        .app-icon-box[data-section="Math"] { background: linear-gradient(135deg, #0f5c3f, #1e8f5e); }
        .app-icon-box[data-section="GKGS"] { background: linear-gradient(135deg, #b85c00, #f39c12); }
        .app-icon-box[data-section="Reasoning"] { background: linear-gradient(135deg, #6a1b9a, #9c27b0); }
        .app-icon-box[data-section="CurrentAffairs"] { background: linear-gradient(135deg, #b71c1c, #f44336); }
        .subject-card.custom-section .app-icon-box { background: linear-gradient(135deg, #c2185b, #ff5722); }
        .subject-card.custom-video .app-icon-box { background: linear-gradient(135deg, #00c6ff, #0072ff); }
        .subject-card.custom-test .app-icon-box { background: linear-gradient(135deg, #10b981, #047857); }
        .subject-card.custom-link .app-icon-box { background: linear-gradient(135deg, #6366f1, #4338ca); }

        .subject-name { font-size: 0.95rem; font-weight: 700; color: #1e293b; text-align: center; line-height: 1.2; word-break: break-word; }
        .chapter-count-badge { position: absolute; top: -6px; right: -6px; background: #ef4444; padding: 3px 8px; font-weight: 800; font-size: 0.8rem; border-radius: 12px; border: 2px solid #fff3e0; color: white; }

        /* ========= COMPACT MASTER LIST (SMART WRAP & AUTO-SCROLL) ========= */
        .master-chapters-section { background: #1e293b; padding: 1.6rem; margin-top: 1rem; border-radius: 8px; border-left: 6px solid #f97316; }
        .master-title { font-size: 1.5rem; font-weight: 700; color: #ffd966; margin-bottom: 1rem; border-left: 4px solid #f97316; padding-left: 1rem; }
        
        .compact-list { 
            display: flex; flex-direction: column; gap: 0.8rem; 
            max-height: 380px; overflow-y: auto; scroll-behavior: smooth;
            padding-right: 5px; /* For scrollbar */
        }
        /* Custom Scrollbar for sleek look */
        .compact-list::-webkit-scrollbar { width: 6px; }
        .compact-list::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        
        .compact-chapter-item { 
            background: #0f172a; padding: 0.8rem 1rem; display: flex; 
            justify-content: space-between; align-items: center; 
            gap: 12px; border-left: 4px solid #f97316; border-radius: 4px; color: white; 
        }
        
        /* स्मार्ट रैपिंग लॉजिक (छोटा नाम बगल में, बड़ा नाम नीचे) */
        .compact-item-text { 
            display: block; flex: 1; min-width: 0; line-height: 1.6;
        }
        .compact-badge { 
            background: #ffedd5; padding: 3px 8px; font-weight: 700; color: #b45309; 
            font-size: 0.75rem; border-radius: 4px; 
            display: inline-block; vertical-align: middle; margin-right: 8px; margin-bottom: 4px;
        }
        .compact-item-text strong { 
            color: white; font-size: 0.95rem; display: inline; vertical-align: middle; word-break: break-word;
        }
        
        .compact-item-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; justify-content: center; align-items: center; }
        .open-pdf-btn, .open-pdf-btn-small { background: #f97316; border: none; padding: 8px 16px; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; transition: 0.2s; white-space: nowrap; width: 100%; text-align: center;}
        .open-pdf-btn:hover, .open-pdf-btn-small:hover { background: #ea580c; transform: scale(1.03); }
        .delete-compact-btn, .delete-chapter-btn { background: #991b1b; border: none; padding: 6px 16px; border-radius: 4px; color: white; display: none; white-space: nowrap; width: 100%; text-align: center;}
        .delete-compact-btn.show-delete, .delete-chapter-btn.show-delete { display: inline-block; }

        /* ========= OVERLAYS ========= */
        .page-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 1000; overflow-y: auto; padding: 1.2rem; display: none; }
        .page-overlay.active { display: block; animation: fade 0.2s; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        .detail-header { background: #1e293b; padding: 1rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; border-left: 6px solid #f97316; margin-bottom: 1.5rem; border-radius: 4px; }
        .back-home-btn, .bottom-back-btn { background: #334155; color: white; border: none; border-radius: 4px; padding: 8px 20px; font-weight: bold; cursor: pointer; }
        .subject-title-lg { font-size: 1.8rem; color: #ffb347; font-weight: 800; }
        
        .chapter-link-card { 
            background: #1e293b; padding: 0.8rem 1rem; display: flex; 
            justify-content: space-between; align-items: center; 
            border-left: 4px solid #f97316; border-radius: 4px; margin-bottom: 12px; color: white; gap: 12px; 
        }
        .chapter-link-text { flex: 1; min-width: 0; display: block; line-height: 1.6; }
        .chapter-link-text span { display: inline-block; vertical-align: middle; margin-right: 8px; margin-bottom: 4px; font-size: 1.1rem; }
        .chapter-link-text strong { display: inline; vertical-align: middle; word-break: break-word; font-size: 0.95rem; }
        
        .chapter-link-actions { flex-shrink: 0; display: flex; flex-direction: column; gap: 6px; }
        .sub-subject-card-item { background: #2d3a4b; padding: 0.8rem; margin-bottom: 8px; cursor: pointer; border-left: 4px solid #f97316; border-radius: 4px; color: white; font-weight: bold; display: flex; justify-content: space-between;}

        /* ========= ADMIN PANEL ========= */
        .admin-panel-area { display: none; margin-top: 2rem; background: #0f172a; padding: 1.6rem; border-left: 8px solid #f97316; border-radius: 8px; color: white;}
        .admin-panel-area.show-admin { display: block; }
        .admin-panel-area h3, .admin-panel-area h4 { color: white; margin-bottom: 1rem; }
        .logout-btn { background: #dc2626; float: right; border: none; border-radius: 4px; padding: 6px 20px; color: white; font-weight: bold; cursor: pointer; margin-bottom: 1rem; }
        .form-flex { display: flex; flex-wrap: wrap; gap: 1rem; clear: both; margin-bottom: 1.2rem; }
        .form-group input, .form-group select { background: #334155; border: none; padding: 10px; color: white; width: 100%; border-radius: 4px; }
        .btn-primary { background: #f97316; border: none; border-radius: 4px; padding: 10px 24px; font-weight: bold; cursor: pointer; color: white;}
        .section-manager { margin-top: 1.5rem; border-top: 1px solid #475569; padding-top: 1rem; }

        /* ========= LOGIN MODAL ========= */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 2000; visibility: hidden; opacity: 0; transition: 0.2s; }
        .modal.active { visibility: visible; opacity: 1; }
        .login-box { background: #1e293b; padding: 2rem; max-width: 380px; width: 90%; border-left: 6px solid #f97316; border-radius: 8px; text-align: center; color: white;}
        .login-box input { background: #334155; border: none; border-radius: 4px; padding: 12px; width: 100%; margin: 10px 0; color: white; }
        
        .site-footer { margin-top: 2rem; background: #0f172a; text-align: center; padding: 1rem; border-radius: 8px; color: #94a3b8; border-top: 2px solid #f97316; font-size: 0.85rem; }
    </style>
</head>
<body>

<div id="loadingScreen">
    <div class="loader-spinner"></div>
    <h3 id="loadingText">डेटा लोड हो रहा है...</h3>
</div>

<div class="app-container" id="homeContainer">
    <div class="hero-section">
        <div class="title-box">
            <h1><i class="fas fa-database"></i> 📚 Study Notes Manager</h1>
            <p>लाइव ऑनलाइन डेटाबेस · ऐप स्टाइल लेआउट</p>
        </div>
        <div class="header-actions">
            <div class="admin-lock-icon" id="adminLockBtn"><i class="fas fa-lock"></i> एडमिन</div>
        </div>
    </div>
    
    <div class="search-bar-container">
        <i class="fas fa-search"></i>
        <input type="text" id="globalSearchInput" placeholder="सर्च करें (उदा: alankar, math, pdf)...">
    </div>
    
    <div class="subjects-grid" id="subjectsGrid"></div>
    
    <div class="master-chapters-section">
        <div class="master-title" id="listTitle"><i class="fas fa-layer-group"></i> सभी लिस्ट (संक्षिप्त सूची)</div>
        <div id="masterCompactList" class="compact-list"></div>
    </div>
    
    <div class="site-footer">
        <p>© 2025 Study Notes Manager | सम्पर्क: <strong>8273684939</strong></p>
    </div>

    <div id="adminPanel" class="admin-panel-area">
        <button id="logoutAdminBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> लॉगआउट</button>
        <h3><i class="fas fa-user-shield"></i> एडमिन डैशबोर्ड</h3>
        <div class="form-flex">
            <div class="form-group"><input type="text" id="adminChapterName" placeholder="फाइल/वीडियो/टेस्ट का नाम"></div>
            <div class="form-group"><input type="url" id="adminPdfUrl" placeholder="लिंक (URL)"></div>
            <div class="form-group"><select id="adminSubjectSelect"></select></div>
            <div class="form-group" id="gkSubSubjectGroup" style="display:none;"><input type="text" id="gkSubSubjectName" placeholder="सब-सब्जेक्ट (Polity/History)"></div>
            <button class="btn-primary" id="addChapterAdminBtn"><i class="fas fa-plus"></i> जोड़ें</button>
        </div>
        <div class="section-manager">
            <h4>➕ नया कस्टम सेक्शन (नया आइकॉन बनाएं)</h4>
            <div class="form-flex">
                <div class="form-group"><input type="text" id="newSectionName" placeholder="नाम (जैसे ऑनलाइन टेस्ट)"></div>
                <div class="form-group">
                    <select id="newSectionContentType">
                        <option value="pdf">पीडीएफ (PDF/Notes)</option>
                        <option value="video">वीडियो (Video/Lectures)</option>
                        <option value="test">ऑनलाइन टेस्ट (Mock/Quizzes)</option>
                        <option value="link">अन्य लिंक (Web Links)</option>
                    </select>
                </div>
                <div class="form-group">
                    <select id="newSectionType">
                        <option value="normal">नॉर्मल (सीधे फाइल)</option>
                        <option value="nested">सब-सेक्शन वाला (फ़ोल्डर के अंदर)</option>
                    </select>
                </div>
                <button class="btn-primary" id="createSectionBtn"><i class="fas fa-plus-circle"></i> बनाएं</button>
            </div>
            <h4>🗑️ सेक्शन प्रबंधन</h4>
            <div id="manageSectionsList" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
        </div>
    </div>
</div>

<div id="subjectPage" class="page-overlay"><div class="detail-header"><button class="back-home-btn" id="backHomeBtn"><i class="fas fa-arrow-left"></i> होम</button><div class="subject-title-lg" id="detailSubjectTitle"></div></div><div id="subjectDetailContent" class="chapters-container"></div><div class="bottom-back-container" style="margin-top:20px; text-align:center;"><button class="bottom-back-btn" id="bottomBackHomeBtn"><i class="fas fa-home"></i> होम पेज</button></div></div>
<div id="subSubjectPage" class="page-overlay"><div class="detail-header"><button class="back-home-btn" id="backToSubjectsBtn"><i class="fas fa-arrow-left"></i> विषय सूची</button><div class="subject-title-lg" id="subSubjectTitle"></div></div><div id="subSubjectChaptersList" class="chapters-container"></div><div class="bottom-back-container" style="margin-top:20px; text-align:center; display: flex; gap: 1rem; justify-content: center;"><button class="bottom-back-btn" id="subBackHomeBtn"><i class="fas fa-home"></i> होम</button><button class="bottom-back-btn" id="subBackToListBtn"><i class="fas fa-list"></i> विषय सूची</button></div></div>
<div id="loginModal" class="modal"><div class="login-box"><i class="fas fa-user-cog" style="font-size: 2.5rem; color:#f97316; margin-bottom: 10px;"></i><h3>एडमिन लॉगिन</h3><input type="text" id="loginUserId" placeholder="मोबाइल नंबर"><input type="password" id="loginPassword" placeholder="पासवर्ड"><button class="btn-primary" id="submitLoginBtn" style="width:100%;">लॉगिन करें</button></div></div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyE6NajCOnS0lZA-1ITRi72wL4eJjSetMr_zcOCsoijO4CNHWEHRq0TUg0H46oR0avBQQ/exec"; 
    const ENCODED_ID = "ODI3MzY4NDkzOQ=="; 
    const ENCODED_PW = "QW5rdXNoQDEyMzFAMTIz"; 
    
    let isAdminLoggedIn = false;
    let appData = { customSections: {} };
    const DEFAULT_SECTIONS = ["Hindi", "Math", "Reasoning", "CurrentAffairs", "GKGS"];
    
    let currentParentSection = "GKGS"; 
    let currentOpenSubject = "";
    let currentOpenSubSubject = "";
    let isPageActive = "home"; 
    let allGlobalItems = []; // सर्च के लिए सारी लिस्ट
    
    // 📖 HINGLISH TO HINDI DICTIONARY (देसी डिक्शनरी जुगाड़)
    const hinglishDict = {
        "hindi": "हिंदी", "math": "गणित", "reasoning": "तर्क", "current": "करंट", "affairs": "अफेयर्स",
        "gk": "जीके", "gs": "जीएस", "polity": "संविधान", "history": "इतिहास", "geography": "भूगोल", "science": "विज्ञान",
        "sarvanam": "सर्वनाम", "alankar": "अलंकार", "sandhi": "संधि", "samas": "समास",
        "practice": "प्रैक्टिस", "test": "टेस्ट", "video": "वीडियो", "question": "क्वेश्चन", "sir": "सर", "vivek": "विवेक"
    };

    // 🚀 AUTO-SCROLL LOGIC
    const compactListEl = document.getElementById("masterCompactList");
    let isHoveringList = false;
    
    compactListEl.addEventListener("mouseenter", () => isHoveringList = true);
    compactListEl.addEventListener("mouseleave", () => isHoveringList = false);
    compactListEl.addEventListener("touchstart", () => isHoveringList = true);
    compactListEl.addEventListener("touchend", () => { setTimeout(() => isHoveringList = false, 1500); });
    
    setInterval(() => {
        // अगर सर्च बार में कुछ लिखा है तो स्क्रॉल मत करो
        if(document.getElementById("globalSearchInput").value.trim() !== "") return;
        
        if (!isHoveringList && compactListEl.scrollHeight > compactListEl.clientHeight) {
            compactListEl.scrollTop += 1; // 1px speed
            if (Math.ceil(compactListEl.scrollTop + compactListEl.clientHeight) >= compactListEl.scrollHeight) {
                compactListEl.scrollTop = 0; // लूप खत्म होने पर वापस ऊपर
            }
        }
    }, 40); // स्पीड कंट्रोल (40ms)

    async function loadData() {
        try {
            document.getElementById("loadingScreen").style.display = "flex";
            const response = await fetch(SCRIPT_URL);
            const storedData = await response.json();
            
            appData = storedData;
            if(!appData.customSections) appData.customSections = {};
            DEFAULT_SECTIONS.forEach(s => { if(s === "GKGS") { if(!appData[s]) appData[s] = {}; } else if(!appData[s]) appData[s] = []; });
            
            document.getElementById("loadingScreen").style.display = "none";
            document.getElementById("homeContainer").style.display = "block";
            fullRefresh();
        } catch (error) {
            document.getElementById("loadingText").innerText = "डेटा लोड करने में समस्या आई।";
        }
    }

    async function silentBackgroundUpdate() {
        try {
            const response = await fetch(SCRIPT_URL);
            const storedData = await response.json();
            if (JSON.stringify(storedData) !== JSON.stringify(appData)) {
                appData = storedData;
                if(!appData.customSections) appData.customSections = {};
                DEFAULT_SECTIONS.forEach(s => { if(s === "GKGS") { if(!appData[s]) appData[s] = {}; } else if(!appData[s]) appData[s] = []; });
                
                fullRefresh();
                
                if (isPageActive === "subject" && currentOpenSubject) openSubject(currentOpenSubject);
                else if (isPageActive === "subSubject" && currentOpenSubject && currentOpenSubSubject) openSubSubject(currentOpenSubject, currentOpenSubSubject);
            }
        } catch (error) {}
    }

    setInterval(silentBackgroundUpdate, 10000);

    async function saveData() {
        document.getElementById("loadingScreen").style.display = "flex";
        document.getElementById("loadingText").innerText = "अपडेट सेव हो रहा है...";
        try {
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ data: appData }) });
            document.getElementById("loadingScreen").style.display = "none";
        } catch(e) {
            alert("सेव करने में एरर: " + e);
            document.getElementById("loadingScreen").style.display = "none";
        }
    }

    function genId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 6); }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => m=='&'?'&amp;':m=='<'?'&lt;':'&gt;'); }

    function getAllSections() {
        let sections = [];
        DEFAULT_SECTIONS.forEach(s => sections.push({ key: s, isDefault: true, contentType: "pdf" }));
        for(let k in appData.customSections) sections.push({ key: k, isDefault: false, type: appData.customSections[k].type, contentType: appData.customSections[k].contentType || "pdf" });
        return sections;
    }
    
    function getSectionData(key) {
        if(DEFAULT_SECTIONS.includes(key)) {
            if(key === "GKGS") return { type: "nested", contentType: "pdf", data: appData[key] };
            return { type: "normal", contentType: "pdf", data: appData[key] };
        }
        return appData.customSections[key] || { type: "normal", contentType: "pdf", data: [] };
    }
    
    function getTotalChapters(secKey) {
        const { type, data } = getSectionData(secKey);
        if(type === "normal") return data.length;
        else { let c=0; for(let s in data) c+=data[s].length; return c; }
    }

    function renderHomeCards() {
        const grid = document.getElementById("subjectsGrid");
        let html = "";
        getAllSections().forEach(s => {
            let count = getTotalChapters(s.key);
            let icon = "fas fa-folder";
            
            if(s.key === "Hindi") icon = "fas fa-language";
            else if(s.key === "Math") icon = "fas fa-calculator";
            else if(s.key === "GKGS") icon = "fas fa-globe-asia";
            else if(s.key === "Reasoning") icon = "fas fa-brain";
            else if(s.key === "CurrentAffairs") icon = "fas fa-newspaper";
            else if(s.contentType === "video") icon = "fas fa-play"; 
            else if(s.contentType === "test") icon = "fas fa-laptop-code"; 
            else if(s.contentType === "link") icon = "fas fa-link"; 
            
            let customClass = !s.isDefault ? (s.contentType === 'video' ? 'custom-video' : s.contentType === 'test' ? 'custom-test' : s.contentType === 'link' ? 'custom-link' : 'custom-section') : '';
            
            html += `<div class="subject-card ${customClass}" data-section="${s.key}"><div class="app-icon-box" data-section="${s.key}"><i class="${icon}"></i><div class="chapter-count-badge">${count}</div></div><div class="subject-name">${s.key}</div></div>`;
        });
        grid.innerHTML = html;
        document.querySelectorAll(".subject-card").forEach(c => c.addEventListener("click", () => openSubject(c.getAttribute("data-section"))));
    }

    function getIconHTML(contentType) {
        if(contentType === 'video') return `<i class="fas fa-play-circle" style="color:#ff4757;"></i>`;
        if(contentType === 'test') return `<i class="fas fa-check-circle" style="color:#10b981;"></i>`;
        if(contentType === 'link') return `<i class="fas fa-external-link-square-alt" style="color:#6366f1;"></i>`;
        return `<i class="fas fa-file-pdf" style="color:#ff6b81;"></i>`;
    }

    function openSubject(secKey) {
        currentOpenSubject = secKey; isPageActive = "subject";
        const { type, contentType, data } = getSectionData(secKey);
        const iconHtml = getIconHTML(contentType);
        const cont = document.getElementById("subjectDetailContent");

        if(type === "nested") {
            const subs = Object.keys(data);
            document.getElementById("detailSubjectTitle").innerText = `📁 ${secKey}`;
            if(subs.length === 0) cont.innerHTML = `<div style="color:white;text-align:center;">कोई सब-सेक्शन नहीं</div>`;
            else {
                let h = "";
                subs.forEach(ss => { h += `<div class="sub-subject-card-item" data-subsub="${escapeHtml(ss)}"><div><i class="fas fa-folder-open" style="color:#ffd966;"></i> <strong>${escapeHtml(ss)}</strong> (${data[ss].length} आइटम)</div><i class="fas fa-chevron-right"></i></div>`; });
                cont.innerHTML = h;
                document.querySelectorAll(".sub-subject-card-item").forEach(el => el.addEventListener("click", () => openSubSubject(secKey, el.getAttribute("data-subsub"))));
            }
            document.getElementById("subjectPage").classList.add("active");
            document.getElementById("subSubjectPage").classList.remove("active");
        } else {
            const chapters = data;
            document.getElementById("detailSubjectTitle").innerText = `📖 ${secKey}`;
            if(chapters.length === 0) cont.innerHTML = `<div style="color:white;text-align:center;">कोई आइटम नहीं</div>`;
            else {
                let h = "";
                chapters.forEach(ch => { 
                    h += `<div class="chapter-link-card">
                        <div class="chapter-link-text"><span>${iconHtml}</span> <strong>${escapeHtml(ch.name)}</strong></div>
                        <div class="chapter-link-actions"><button class="open-pdf-btn-small" data-url="${escapeHtml(ch.url)}"><i class="fas fa-external-link-alt"></i> ओपन</button>${isAdminLoggedIn ? `<button class="delete-chapter-btn show-delete" data-section="${secKey}" data-id="${ch.id}"> हटाएँ</button>` : ''}</div>
                    </div>`; 
                });
                cont.innerHTML = h;
                attachOpenButtons(cont);
            }
            if(isAdminLoggedIn) attachDeleteInSubject(secKey);
            document.getElementById("subjectPage").classList.add("active");
        }
    }

    function attachOpenButtons(container) { container.querySelectorAll(".open-pdf-btn-small").forEach(btn => btn.addEventListener("click", (e) => { e.stopPropagation(); window.open(btn.getAttribute("data-url"), "_blank"); })); }
    
    function attachDeleteInSubject(sec) {
        document.querySelectorAll(".delete-chapter-btn").forEach(btn => {
            btn.addEventListener("click", async (e) => { const id = btn.getAttribute("data-id"), section = btn.getAttribute("data-section"); if(confirm("हटाएं?")) { let secData = getSectionData(section); secData.data = secData.data.filter(c => c.id !== id); if(DEFAULT_SECTIONS.includes(section)) appData[section] = secData.data; else appData.customSections[section].data = secData.data; await saveData(); fullRefresh(); openSubject(section); } });
        });
    }

    function openSubSubject(parent, subName) {
        currentParentSection = parent; currentOpenSubject = parent; currentOpenSubSubject = subName; isPageActive = "subSubject";
        const { data, contentType } = getSectionData(parent);
        const iconHtml = getIconHTML(contentType);
        const chapters = data[subName] || [];
        document.getElementById("subSubjectTitle").innerText = `📂 ${subName}`;
        const cont = document.getElementById("subSubjectChaptersList");
        if(chapters.length === 0) cont.innerHTML = `<div style="color:white;text-align:center;">कोई आइटम नहीं</div>`;
        else {
            let h = "";
            chapters.forEach(ch => { 
                h += `<div class="chapter-link-card">
                    <div class="chapter-link-text"><span>${iconHtml}</span> <strong>${escapeHtml(ch.name)}</strong></div>
                    <div class="chapter-link-actions"><button class="open-pdf-btn-small" data-url="${escapeHtml(ch.url)}"><i class="fas fa-external-link-alt"></i> ओपन</button>${isAdminLoggedIn ? `<button class="delete-chapter-btn show-delete" data-parent="${parent}" data-subname="${subName}" data-id="${ch.id}"> हटाएँ</button>` : ''}</div>
                </div>`; 
            });
            cont.innerHTML = h;
            attachOpenButtons(cont);
        }
        if(isAdminLoggedIn){
            document.querySelectorAll(".delete-chapter-btn").forEach(btn => {
                btn.addEventListener("click", async (e) => { const p = btn.getAttribute("data-parent"), sn = btn.getAttribute("data-subname"), id = btn.getAttribute("data-id"); if(confirm("हटाएं?")) { let secData = getSectionData(p); let arr = secData.data[sn]; if(arr) { secData.data[sn] = arr.filter(c => c.id !== id); if(secData.data[sn].length === 0) delete secData.data[sn]; if(DEFAULT_SECTIONS.includes(p)) appData[p] = secData.data; else appData.customSections[p].data = secData.data; await saveData(); fullRefresh(); openSubSubject(p, sn); } } });
            });
        }
        document.getElementById("subSubjectPage").classList.add("active");
        document.getElementById("subjectPage").classList.remove("active");
    }

    // 🔍 SEARCH FUNCTIONALITY
    document.getElementById("globalSearchInput").addEventListener("input", function(e) {
        renderCompactMasterList(e.target.value);
    });

    function renderCompactMasterList(searchQuery = "") {
        const container = document.getElementById("masterCompactList");
        allGlobalItems = [];
        
        getAllSections().forEach(sec => {
            const { type, data } = getSectionData(sec.key);
            if(type === "normal") data.forEach(ch => allGlobalItems.push({ ...ch, label: sec.key, sKey: sec.key }));
            else for(let sub in data) data[sub].forEach(ch => allGlobalItems.push({ ...ch, label: `${sec.key} (${sub})`, sKey: sec.key, subName: sub }));
        });

        let filteredItems = allGlobalItems;
        
        // Hinglish Search Logic
        if(searchQuery.trim() !== "") {
            let q = searchQuery.toLowerCase();
            // डिक्शनरी से वर्ड ऐड करो (ताकि hindi लिखने पर हिंदी भी सर्च हो)
            let extendedQuery = q;
            for(let key in hinglishDict) { if(q.includes(key)) extendedQuery += " " + hinglishDict[key]; }
            
            let searchParts = extendedQuery.split(" ").filter(p => p.trim() !== "");
            
            filteredItems = allGlobalItems.filter(item => {
                let targetText = (item.name + " " + item.label).toLowerCase();
                // अगर कोई भी वर्ड मैच करता है, तो दिखाओ
                return searchParts.some(part => targetText.includes(part));
            });
            document.getElementById("listTitle").innerHTML = `<i class="fas fa-search"></i> सर्च रिज़ल्ट (${filteredItems.length})`;
        } else {
            document.getElementById("listTitle").innerHTML = `<i class="fas fa-layer-group"></i> सभी लिस्ट (संक्षिप्त सूची)`;
        }

        if(filteredItems.length === 0) { container.innerHTML = `<div style="color:#94a3b8; text-align:center; padding: 20px;">📭 कोई रिजल्ट नहीं मिला</div>`; return; }
        
        let h = "";
        filteredItems.forEach(ch => {
            const del = isAdminLoggedIn ? `<button class="delete-compact-btn show-delete" data-id="${ch.id}" data-seckey="${ch.sKey}" data-subname="${ch.subName || ''}"> हटाएँ</button>` : '';
            h += `<div class="compact-chapter-item">
                    <div class="compact-item-text">
                        <span class="compact-badge">${escapeHtml(ch.label)}</span> 
                        <strong>${escapeHtml(ch.name)}</strong>
                    </div>
                    <div class="compact-item-actions">
                        <button class="open-pdf-btn" data-url="${escapeHtml(ch.url)}"><i class="fas fa-external-link-alt"></i> ओपन</button> 
                        ${del}
                    </div>
                  </div>`;
        });
        container.innerHTML = h;
        document.querySelectorAll(".open-pdf-btn").forEach(btn => btn.addEventListener("click", () => window.open(btn.getAttribute("data-url"), "_blank")));
        if(isAdminLoggedIn) attachCompactDelete();
    }

    function attachCompactDelete() {
        document.querySelectorAll(".delete-compact-btn").forEach(btn => {
            btn.addEventListener("click", async (e) => {
                e.stopPropagation(); const id = btn.getAttribute("data-id"), secKey = btn.getAttribute("data-seckey"), sub = btn.getAttribute("data-subname");
                if(confirm("हटाएं?")) {
                    const { type, data } = getSectionData(secKey);
                    if(type === "normal") { let nd = data.filter(c => c.id !== id); if(DEFAULT_SECTIONS.includes(secKey)) appData[secKey] = nd; else appData.customSections[secKey].data = nd; }
                    else { let arr = data[sub]; if(arr) { let narr = arr.filter(c => c.id !== id); if(narr.length === 0) delete data[sub]; else data[sub] = narr; if(DEFAULT_SECTIONS.includes(secKey)) appData[secKey] = data; else appData.customSections[secKey].data = data; } }
                    await saveData(); fullRefresh();
                }
            });
        });
    }

    function updateAdminSelect() {
        const sel = document.getElementById("adminSubjectSelect");
        let opts = ""; getAllSections().forEach(s => { opts += `<option value="${s.key}">${s.key}</option>`; });
        sel.innerHTML = opts; toggleGkField();
    }
    
    function toggleGkField() { let sec = document.getElementById("adminSubjectSelect").value; let { type } = getSectionData(sec); document.getElementById("gkSubSubjectGroup").style.display = type === "nested" ? "block" : "none"; }
    
    async function addChapter() {
        if(!isAdminLoggedIn) return alert("लॉगिन करें");
        let name = document.getElementById("adminChapterName").value.trim(), url = document.getElementById("adminPdfUrl").value.trim(), section = document.getElementById("adminSubjectSelect").value;
        if(!name || !url) return alert("सभी भरें");
        if(!url.startsWith("http")) url = "https://" + url;
        const { type, data } = getSectionData(section);
        if(type === "nested") {
            let subN = document.getElementById("gkSubSubjectName").value.trim();
            if(!subN) return alert("सब-सेक्शन नाम");
            if(!data[subN]) data[subN] = [];
            data[subN].push({ id: genId(), name, url });
            if(DEFAULT_SECTIONS.includes(section)) appData[section] = data; else appData.customSections[section].data = data;
        } else {
            data.push({ id: genId(), name, url });
            if(DEFAULT_SECTIONS.includes(section)) appData[section] = data; else appData.customSections[section].data = data;
        }
        await saveData(); fullRefresh(); alert("लाइव सेव हो गया!");
        document.getElementById("adminChapterName").value = ""; document.getElementById("adminPdfUrl").value = ""; document.getElementById("gkSubSubjectName").value = "";
    }
    
    async function createNewSection() {
        if(!isAdminLoggedIn) return;
        let name = document.getElementById("newSectionName").value.trim();
        if(!name) return alert("नाम लिखें");
        if(DEFAULT_SECTIONS.includes(name) || appData.customSections[name]) return alert("पहले से है");
        
        let type = document.getElementById("newSectionType").value;
        let cType = document.getElementById("newSectionContentType").value; 
        
        if(type === "normal") appData.customSections[name] = { type: "normal", contentType: cType, data: [] };
        else appData.customSections[name] = { type: "nested", contentType: cType, data: {} };
        
        await saveData(); fullRefresh(); document.getElementById("newSectionName").value = ""; alert(`सेक्शन "${name}" लाइव बन गया`);
    }
    
    function renderManageSections() {
        const cont = document.getElementById("manageSectionsList");
        let html = "";
        getAllSections().forEach(sec => {
            if(sec.isDefault) html += `<span style="background:#334155; padding:4px 12px; border-radius:4px;">🔒 ${sec.key}</span>`;
            else html += `<span style="background:#991b1b; padding:4px 12px; border-radius:4px;">${sec.key} (${sec.contentType}) <button class="delete-section-btn" data-sec="${sec.key}" style="background:black; color:white; border:none; margin-left:6px; padding: 2px 6px; cursor:pointer; border-radius:2px;">हटाएं</button></span>`;
        });
        cont.innerHTML = html;
        document.querySelectorAll(".delete-section-btn").forEach(btn => btn.addEventListener("click", async () => { let s = btn.getAttribute("data-sec"); if(confirm(`"${s}" डिलीट?`)) { delete appData.customSections[s]; await saveData(); fullRefresh(); } }));
    }
    
    function fullRefresh() { renderHomeCards(); renderCompactMasterList(document.getElementById("globalSearchInput").value); updateAdminSelect(); renderManageSections(); if(isAdminLoggedIn) document.getElementById("adminPanel").classList.add("show-admin"); else document.getElementById("adminPanel").classList.remove("show-admin"); }

    const modal = document.getElementById("loginModal");
    const loginIdField = document.getElementById("loginUserId");
    const loginPwField = document.getElementById("loginPassword");
    function clearLoginFields() { loginIdField.value = ""; loginPwField.value = ""; }
    
    document.getElementById("adminLockBtn").addEventListener("click", () => {
        if(isAdminLoggedIn){ isAdminLoggedIn=false; fullRefresh(); alert("लॉग आउट"); clearLoginFields(); }
        else { clearLoginFields(); modal.classList.add("active"); }
    });
    
    document.getElementById("submitLoginBtn").addEventListener("click", () => {
        let u = loginIdField.value.trim(), p = loginPwField.value.trim();
        if(btoa(u) === ENCODED_ID && btoa(p) === ENCODED_PW){ isAdminLoggedIn=true; modal.classList.remove("active"); fullRefresh(); alert("लॉगिन सफल!"); clearLoginFields(); }
        else alert("गलत आईडी या पासवर्ड!");
    });
    
    document.getElementById("logoutAdminBtn")?.addEventListener("click", () => { isAdminLoggedIn=false; fullRefresh(); alert("लॉगआउट"); clearLoginFields(); });
    
    document.getElementById("backHomeBtn").addEventListener("click", () => { document.getElementById("subjectPage").classList.remove("active"); isPageActive = "home"; });
    document.getElementById("bottomBackHomeBtn").addEventListener("click", () => { document.getElementById("subjectPage").classList.remove("active"); isPageActive = "home"; });
    document.getElementById("backToSubjectsBtn").addEventListener("click", () => { document.getElementById("subSubjectPage").classList.remove("active"); openSubject(currentParentSection); });
    document.getElementById("subBackHomeBtn").addEventListener("click", () => { document.getElementById("subSubjectPage").classList.remove("active"); document.getElementById("subjectPage").classList.remove("active"); isPageActive = "home"; });
    document.getElementById("subBackToListBtn").addEventListener("click", () => { document.getElementById("subSubjectPage").classList.remove("active"); openSubject(currentParentSection); });
    
    document.getElementById("addChapterAdminBtn").addEventListener("click", addChapter);
    document.getElementById("createSectionBtn").addEventListener("click", createNewSection);
    document.getElementById("adminSubjectSelect").addEventListener("change", toggleGkField);
    
    loadData(); 
</script>
</body>
</html>
